# TASFT Reproducibility Config: Llama-3-8B on MedQA
# Reference configuration for the reproduce.py single-command evaluation.
#
# Expected outcome:
#   - MedQA accuracy within 1% of dense fine-tuned baseline
#   - Mean attention sparsity >= 0.6 (target 0.8)
#   - 2-3x decode throughput improvement via block-sparse attention
#
# Hardware: 2x H100-80GB assumed
# Wall time: ~4h on 2x H100-80GB
#
# This is the canonical config for reproducing Table 1 in the paper.

model:
  base_model_id: "meta-llama/Meta-Llama-3-8B"
  model_name: "TASFT-Llama3-8B-MedQA"
  torch_dtype: "bfloat16"
  attn_implementation: "eager"  # Required for full attention score extraction during gate calibration

# LoRA configuration for task adaptation
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

# AttnGate configuration for sparse attention learning
gate:
  block_size: 64
  gate_hidden_dim: 32
  default_threshold: 0.5
  num_layers: 32  # Patch all 32 Llama-3-8B layers

# Dual objective: L_total = L_task + lambda_gate * (L_gate + beta_sparse * L_sparse)
objective:
  lambda_gate: 0.1
  beta_sparse: 0.01
  tau_target: 0.8
  label_smoothing: 0.0
  gate_lr_ratio: 0.1      # gate_lr = learning_rate * 0.1 = 2e-5
  gate_warmup_steps: 100   # Gate loss inactive for first 100 steps

# Layer rotation scheduler for memory-efficient gate calibration
layer_rotation:
  strategy: "round_robin"  # Deterministic cycling through all 32 layers
  layers_per_step: 4       # Calibrate 4 of 32 layers per step -> 8 cycles for full coverage
  ema_alpha: 0.1
  seed: 42

# Training hyperparameters (paper Table 1 settings)
training:
  output_dir: "./outputs/llama3_8b_medqa"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4
  # Effective batch size: 4 * 4 = 16
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  max_seq_length: 2048
  bf16: true
  gradient_checkpointing: true
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  seed: 42
  logging_steps: 10
  eval_steps: 250
  save_steps: 500
  save_total_limit: 3
  eval_strategy: "steps"
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  report_to: "none"
  run_name: "tasft-llama3-8b-medqa"

# Dataset configuration
dataset:
  name: "bigbio/med_qa"
  split_train: "train"
  split_eval: "validation"
  text_column: "question"
  label_column: "answer"
  max_samples_train: null  # Use full dataset
  max_samples_eval: 1000
  preprocessing:
    template: "Question: {question}\nAnswer: {answer}"
    truncation: true
    padding: "max_length"
    packing: true

# Evaluation configuration
evaluation:
  task_eval:
    benchmark: "medqa_usmle"
    num_fewshot: 0
    batch_size: 16
  gate_eval:
    compute_sparsity_profile: true
    compute_kl_divergence: true
    block_size: 64
  throughput_eval:
    seq_lengths: [512, 1024, 2048]
    batch_sizes: [1, 4, 8]
    num_warmup: 5
    num_iterations: 50

# Bundle export configuration
bundle:
  output_dir: "./bundles/llama3_8b_medqa"
  include_eval_summary: true
  compress: false

# Observability
observability:
  log_level: "INFO"
  log_json: true
  metrics_push_gateway: null
  tracing_endpoint: null
  wandb:
    project: "tasft"
    entity: null
    tags: ["llama3-8b", "medqa", "sparse-attention", "reproducibility"]
