line-length = 100
target-version = "py311"

[lint]
select = ["ALL"]
ignore = [
    "D",       # docstring style (we enforce content, not style)
    "ANN101",  # self annotation (removed rule, kept for compat)
    "ANN102",  # cls annotation (removed rule, kept for compat)
    "ANN401",  # Any type — necessary for torch/transformers interop
    "S101",    # assert in tests is fine
    "T201",    # print in scripts is fine
    "FIX002",  # TODO comments (we ban them via other means)
    "TD",      # TODO format
    "ERA001",  # commented-out code (caught by other tooling)
    "TRY003",  # long exception messages — our exceptions carry structured context
    "EM101",   # string literal in exception — acceptable with structured exceptions
    "EM102",   # f-string in exception — acceptable with structured exceptions
    "FBT001",  # boolean positional arg — standard for causal, training flags
    "FBT002",  # boolean default value — standard API pattern
    "PLR0913", # too many arguments — complex configs and kernel launches require this
    "BLE001",  # blind exception catch — used in graceful degradation paths
    "TRY300",  # return in try — acceptable pattern for resource cleanup
    "TRY301",  # raise in try — acceptable for re-raising with context
    "COM812",  # trailing comma — conflicts with formatter
    "PTH118",  # os.path.join — acceptable, not all paths are pathlib
    "PTH123",  # open() — acceptable alongside Path usage
    "PTH110",  # os.path.exists — acceptable
    "PTH112",  # os.path.isdir — acceptable
    "PTH103",  # os.makedirs — acceptable
    "PTH208",  # os.listdir — acceptable
    "RUF002",  # ambiguous unicode — false positives on math symbols
    "RUF043",  # pairwise iteration — acceptable pattern
    "PLC0415", # import not at top level — conditional/lazy imports needed
    "PERF401", # manual list comprehension — readability preference
    "PLW2901", # loop variable overwritten — acceptable in some patterns
]

[lint.isort]
known-first-party = ["tasft"]

[lint.per-file-ignores]
"tests/**" = ["S", "ANN", "PLR2004", "SLF001", "ARG002", "N806", "N803", "N812", "PLR0915", "C901", "E741", "PLR0912", "FBT003", "B017", "PT011", "ARG001", "TC003", "SIM117", "B007"]
"scripts/**" = ["T201", "ANN"]
# Tensor code uses uppercase dimension variables (B, H, S, D) per GPU/ML convention
"tasft/modules/**" = ["N806", "N803", "N812", "ARG002", "PLR2004"]
"tasft/training/**" = ["N806", "N803", "N812", "ARG002", "PLR2004", "C901", "ARG005", "B007"]
"tasft/eval/**" = ["N806", "N803", "N812", "C901", "PLR0915", "PLR0912", "ARG002", "PLR2004", "E741", "S603", "S607"]
"tasft/inference/**" = ["N806", "N803", "N812", "ARG002", "PLR2004", "C901", "PLR0912", "PLR0915", "SLF001", "ARG005", "B008"]
"tasft/observability/**" = ["ARG002", "S607"]
"tasft/bundle/**" = ["N806", "N803", "C901", "PLR0912"]
# Triton JIT kernels: no type annotations on pointer args, uppercase tensor dims,
# many args (GPU strides), conditional imports, f-string exceptions
# Pydantic validators use f-string error messages for clear validation feedback
"tasft/kernels/**" = [
    "ANN001", "ANN202",  # Triton JIT args cannot have Python type annotations
    "N803", "N806",       # Uppercase Q_ptr, K_ptr, B, H, S, D are GPU conventions
    "PLC0415",            # Runtime backend detection requires conditional imports
]
